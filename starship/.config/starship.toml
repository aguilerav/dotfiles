# ~/.config/starship.toml
"$schema" = 'https://starship.rs/config-schema.json'

# 1. ConfiguraciГіn global
add_newline = true
command_timeout = 1000
palette = "wezterm"

# 2. Formato
format = """
[в–‘в–’в–“](fg:color_user_bg)\
$os\
$username\
[оӮҙ](bg:color_dir_bg fg:color_user_bg)\
$directory\
[оӮҙ](bg:color_git_bg fg:color_dir_bg)\
$git_branch\
$git_status\
$python\
[оӮҙ](fg:color_git_bg)\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

# 3. MГіdulos
[os]
disabled = false
style = "bg:color_user_bg fg:color_user_fg"
format = "[ $symbol]($style)"

[os.symbols]
Macos = "оң‘"
Pop = "пҢӘ"
Ubuntu = "пҢӣ"
Linux = "п…ј "

[username]
show_always = true
style_user = "bg:color_user_bg fg:color_user_fg"
style_root = "bg:color_user_bg fg:color_user_fg bold"
format = "[ пҗ• $user ]($style)"
disabled = false

[directory]
style = "bg:color_dir_bg fg:color_dir_fg"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"
home_symbol = "~"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:color_git_bg"
# Usamos el verde brillante de WezTerm para resaltar la rama
format = '[[ $symbol $branch ](fg:color_git_icon bg:color_git_bg)]($style)'

[git_status]
style = "bg:color_git_bg"
format = '[[($all_status$ahead_behind )](fg:color_git_icon bg:color_git_bg)]($style)'

[python]
symbol = "оҲө "
style = "bg:color_git_bg"
# Usamos el amarillo de WezTerm para el icono/texto de Python
format = '[[ $symbol($virtualenv) ](fg:color_python bg:color_git_bg)]($style)'

[fill]
symbol = " "

[cmd_duration]
min_time = 3000
# Amarillo para coincidir con tus tonos cГЎlidos
style = "fg:color_python"
format = "[took $duration]($style) "

[time]
disabled = false
time_format = "%R" # Formato Hora:Minuto
# Morado claro para que resalte sutilmente en la derecha
style = "fg:color_time"
format = '[ пҗә $time ]($style)'

# El caracter de la segunda lГӯnea (flecha)
[character]
# Usamos exactamente tus colores verde y rojo de WezTerm
success_symbol = "[вқҜ](#44FFB1)"
error_symbol = "[вқҜ](#E52E2E)"
vicmd_symbol = "[вқ®](#44FFB1)"

# 4. Paleta de Colores (Basada en tu WezTerm)
[palettes.wezterm]
color_user_bg = "#0FC5ED"   # Cyan/Azul claro (ansi 4)
color_user_fg = "#011423"   # Fondo oscuro para contraste
color_dir_bg = "#214969"    # Azul grisГЎceo oscuro (ansi 0)
color_dir_fg = "#CBE0F0"    # Foreground principal
color_git_bg = "#033259"    # Selection bg (un tono mГЎs profundo)
color_git_icon = "#44FFB1"  # Verde brillante para iconos Git
color_python = "#FFE073"    # Amarillo para Python y duraciГіn
color_time = "#a277ff"      # Morado para la hora
